name: Auto-Update Horse Database

on:
  schedule:
    # Run at 18:00 UTC (2 AM Hong Kong Time) every day
    - cron: '0 18 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 lxml html5lib
          
      - name: Run Profile Scraper
        run: |
          python hkjc_profile_scraper.py
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name 'Golden Stallion Automator'
          git config --global user.email 'automator@golden-stallion.local'
          git add data/latest_horse_stats.csv
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update latest horse stats database" && git push)
